name: Build Android APK (Capacitor)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Build Web Application
        run: npm run build:pages
        env:
          VITE_BACKEND_URL: 'https://wsswws.vercel.app'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Regenerate Gradle Wrapper
        run: |
          mkdir temp-gradle
          cd temp-gradle
          touch settings.gradle
          gradle wrapper --gradle-version 8.14.3
          cd ..
          cp temp-gradle/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar
          cp temp-gradle/gradle/wrapper/gradle-wrapper.properties android/gradle/wrapper/gradle-wrapper.properties
          cp temp-gradle/gradlew android/gradlew
          cp temp-gradle/gradlew.bat android/gradlew.bat
          rm -rf temp-gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Synchronize Capacitor Project
        run: npx cap sync

      - name: Build Android App (Assemble Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
